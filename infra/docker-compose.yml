version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    restart: unless-stopped

  scraper-youtube:
    build:
      context: ..
      dockerfile: infra/docker/scraper-light.Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../data/bronze:/app/data/bronze

  scraper-twitter:
    build:
      context: ..
      dockerfile: infra/docker/scraper-heavy.Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../data/bronze:/app/data/bronze
